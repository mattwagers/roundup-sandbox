project:
  type: website


website:
  title: "The Consortium Blog"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: contributors.qmd
        text: Contributors
    right:
      - icon: github
        href: https://github.com/your-org/blog
  search: true
  comments:
    giscus:
      repo: mattwagers/roundup-sandbox
      repo-id: R_kgDOSYLa8w
      category: Post Comments
      category-id: DIC_kwDOSYLa884C8oRx
      mapping: pathname
      reactions-enabled: true
      loading: lazy
  page-footer:
    left: "© 2026 The Consortium"
    right:
      - icon: github
        href: https://github.com/placeholder/consortium-blog
        aria-label: GitHub

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: assets/custom.css
    toc: true
    code-fold: true
    code-tools: true
    include-in-header:
      - text: |
          <script src="https://hypothes.is/embed.js" async></script>

execute:
  freeze: auto
